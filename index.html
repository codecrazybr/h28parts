<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>H28 - Sistema de Consulta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260611-nadir-dot-align">
</head>
<body>
  <header class="topbar">
    <div class="container header-content">
      <img class="brand-logo" src="nadir-logo.png" alt="Nadir">
      <div class="header-title" aria-label="H28 - Sistema de Consulta">
        <span class="header-title-main">H28</span>
        <span class="header-title-divider"></span>
        <span class="header-title-sub">Sistema de Consulta</span>
      </div>
    </div>
  </header>

  <main class="container">
    <nav class="tabs" aria-label="Telas do sistema">
      <button class="tab-button active" type="button" data-screen="registerScreen">Cadastrar Item</button>
      <button class="tab-button" type="button" data-screen="searchScreen">Consultar Item</button>
    </nav>

    <section id="registerScreen" class="screen active" aria-labelledby="registerTitle">
      <h2 id="registerTitle">Cadastrar Item</h2>

      <form id="partForm" class="form">
        <label>
          Foto do item (opcional)
          <input id="photo" type="file" accept="image/*">
        </label>

        <label>
          Nome do item
          <input id="name" type="text" autocomplete="off" required>
        </label>

        <label>
          Código do item
          <input id="code" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
        </label>

        <label>
          Número do desenho
          <input id="drawingNumber" type="text" autocomplete="off" required>
        </label>

        <label>
          Aplicação
          <input id="application" type="text" autocomplete="off" required>
        </label>

        <div class="form-actions">
          <button class="primary-button" type="submit">Salvar item</button>
        </div>
        <p id="formMessage" class="message" aria-live="polite"></p>
      </form>

      <footer class="system-status footer-status">
        <div class="status-pill system-active"><span class="status-dot"></span>Sistema ativo</div>
        <div class="status-pill connection-status is-checking" id="connectionStatus"><span class="status-dot"></span>Conexão: verificando</div>
        <div class="status-pill" id="itemsCounter">Itens: carregando...</div>
        <button class="usage-button" id="refreshStatusButton" type="button">Atualizar</button>
      </footer>
    </section>

    <section id="searchScreen" class="screen" aria-labelledby="searchTitle">
      <h2 id="searchTitle">Consultar Item</h2>

      <div class="search-box">
        <label>
          Pesquisar por nome, código, número do desenho ou aplicação
          <input id="searchInput" type="search" autocomplete="off" placeholder="Digite para pesquisar">
        </label>
      </div>

      <div id="results" class="results" aria-live="polite"></div>
    </section>
  </main>

  <div id="confirmModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <h2 id="confirmTitle">Confirmar ação</h2>
      <p id="confirmMessage">Tem certeza?</p>
      <label id="deletePasswordLabel" class="password-field hidden">
        Senha
        <input id="deletePassword" type="password" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="Digite a senha">
      </label>
      <div class="modal-actions">
        <button id="cancelAction" class="secondary-button" type="button">Cancelar</button>
        <button id="confirmAction" class="delete-button" type="button">Confirmar</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <h2 id="editTitle">Editar item</h2>

      <form id="editForm" class="form">
        <label>
          Nova foto (opcional - se não escolher, mantém a atual)
          <input id="editPhoto" type="file" accept="image/*">
        </label>

        <label>
          Nome do item
          <input id="editName" type="text" autocomplete="off" required>
        </label>

        <label>
          Código do item
          <input id="editCode" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" required>
        </label>

        <label>
          Número do desenho
          <input id="editDrawingNumber" type="text" autocomplete="off" required>
        </label>

        <label>
          Aplicação
          <input id="editApplication" type="text" autocomplete="off" required>
        </label>

        <div class="modal-actions">
          <button id="cancelEditModal" class="secondary-button" type="button">Cancelar</button>
          <button class="primary-button" type="submit">Salvar edição</button>
        </div>
      </form>
    </div>
  </div>

  <div id="photoModal" class="modal-overlay" aria-hidden="true">
    <div class="photo-modal-box" role="dialog" aria-modal="true" aria-label="Foto ampliada do item">
      <button id="closePhotoModal" class="photo-close-button" type="button" aria-label="Fechar foto ampliada">×</button>
      <img id="expandedPhoto" src="" alt="">
    </div>
  </div>

  <div id="successToast" class="success-toast" aria-live="polite" aria-hidden="true">
    <div class="success-check" aria-hidden="true">
      <svg viewBox="0 0 52 52"><path d="M14 27l8 8 17-18"></path></svg>
    </div>
    <p>Item cadastrado com sucesso</p>
  </div>

  <div id="editToast" class="edit-toast" aria-live="polite" aria-hidden="true">
    <div class="edit-check" aria-hidden="true">
      <svg viewBox="0 0 52 52"><path d="M14 27l8 8 17-18"></path></svg>
    </div>
    <p>Item editado com sucesso</p>
  </div>

  <div id="deleteToast" class="delete-toast" aria-live="polite" aria-hidden="true">
    <div class="delete-check" aria-hidden="true">
      <svg viewBox="0 0 52 52">
        <path d="M15 17h22"></path>
        <path d="M21 17v-4h10v4"></path>
        <path d="M18 17l2 24h12l2-24"></path>
        <path d="M24 24v10"></path>
        <path d="M28 24v10"></path>
      </svg>
    </div>
    <p>Item excluído com sucesso</p>
  </div>

  <div id="warningToast" class="warning-toast" aria-live="polite" aria-hidden="true">
    <div class="warning-check" aria-hidden="true">
      <svg viewBox="0 0 52 52">
        <path d="M26 12v18"></path>
        <path d="M26 39h.01"></path>
      </svg>
    </div>
    <p>O item já está cadastrado no sistema</p>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="nadir-loader" role="status" aria-live="polite">
      <div class="nadir-mark" aria-hidden="true">
        <span class="nadir-n">
          <img src="nadir-logo.png" alt="">
        </span>
        <span class="nadir-dot"></span>
      </div>
      <p id="loadingText">Carregando...</p>
    </div>
  </div>

  <script src="supabase-config.js?v=20260611-nadir-dot-align"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js?v=20260611-nadir-dot-align"></script>
</body>
</html>
